# =============================================================================
# Configuration pytest du backend.
#
# pythonpath = .  → ajoute le dossier backend/ au chemin d'import Python
#   AVANT de collecter les tests. Sans cela, `from app import ...` échoue
#   quand pytest est lancé via la commande `pytest` (contrairement à
#   `python -m pytest`, qui ajoute le dossier courant automatiquement).
#   C'est LA différence qui faisait passer les tests en local mais échouer
#   en CI GitHub Actions. Cette ligne rend les deux invocations équivalentes.
#
# testpaths = tests  → pytest ne cherche les tests QUE dans tests/, sans
#   scanner venv/ ou d'autres dossiers (plus rapide, pas de faux positifs).
# =============================================================================
[pytest]
pythonpath = .
testpaths = tests
