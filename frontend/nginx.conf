# =============================================================================
# Config nginx du frontend (dans le conteneur Docker).
#
# Deux rôles :
#   1. Servir l'application React (fichiers statiques compilés).
#   2. Relayer les appels /api/... vers le conteneur backend (service "api"),
#      exactement comme le proxy Vite le fait en développement. Le navigateur
#      ne parle qu'à nginx : pas de problème CORS, une seule origine.
# =============================================================================
server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Type MIME du manifeste PWA (absent des types nginx par défaut).
    location = /manifest.webmanifest {
        default_type application/manifest+json;
        add_header Cache-Control "no-cache";
    }
    # Le service worker ne doit pas être mis en cache par le navigateur,
    # sinon une nouvelle version ne serait jamais récupérée.
    location = /sw.js {
        add_header Cache-Control "no-cache";
    }
    # Les fichiers compiles (JS/CSS) portent un hash de contenu dans leur nom
    # -> on peut les mettre en cache "pour toujours" sans risque de peremption.
    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # Proxy API : /api/clients -> http://api:8000/clients
    # (le /api/ est retiré, comme le rewrite du proxy Vite).
    location /api/ {
        proxy_pass http://api:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # SPA fallback : toute route inconnue renvoie index.html, car c'est
    # React Router (côté navigateur) qui gère /clients, /dashboard, etc.
    # Sans ça, un rafraîchissement sur /dashboard donnerait un 404 nginx.
    #
    # no-cache sur le HTML : le navigateur REVALIDE index.html a chaque visite
    # -> il recupere toujours la derniere version (qui pointe vers les bons
    # bundles JS/CSS). C'est ce qui evite de voir une ANCIENNE version apres
    # une mise a jour. Les assets hashes, eux, restent en cache (voir plus haut).
    location / {
        add_header Cache-Control "no-cache";
        try_files $uri $uri/ /index.html;
    }
}
